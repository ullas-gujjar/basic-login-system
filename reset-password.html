<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password • Basic Login System UI</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    .toggle-btn{ cursor:pointer; }
  </style>
</head>
<body>
  <main class="auth-wrap">
    <section class="card auth-card">
      <div class="card-body">
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="brand-mark" aria-hidden="true">
            <i class="bi bi-key"></i>
          </div>
          <div>
            <h1 class="h3 mb-1 page-title">Reset password</h1>
            <p class="mb-0 page-subtitle">Choose a new password to continue.</p>
          </div>
        </div>

        <form class="mt-4" onsubmit="event.preventDefault(); window.location.href='login.html';">
          <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <div class="input-group">
              <input id="newPassword" type="password" class="form-control" placeholder="Enter new password" minlength="6" required />
              <span class="input-group-text toggle-btn" role="button" tabindex="0" data-target="newPassword" aria-label="Show or hide password">
                <i class="bi bi-eye"></i>
              </span>
            </div>
          </div>

          <div class="mb-2">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="input-group">
              <input id="confirmPassword" type="password" class="form-control" placeholder="Re-enter new password" minlength="6" required />
              <span class="input-group-text toggle-btn" role="button" tabindex="0" data-target="confirmPassword" aria-label="Show or hide password">
                <i class="bi bi-eye"></i>
              </span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-3">
            Update Password
            <i class="bi bi-arrow-repeat ms-1"></i>
          </button>

          <div class="mt-4 text-center">
            <a class="small-link" href="login.html">
              <i class="bi bi-arrow-left me-1"></i>
              Back to login
            </a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      function toggle(inputId, iconEl) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        iconEl.classList.toggle('bi-eye', !isPassword);
        iconEl.classList.toggle('bi-eye-slash', isPassword);
      }

      document.querySelectorAll('.toggle-btn').forEach(function (btn) {
        const target = btn.getAttribute('data-target');
        const icon = btn.querySelector('i');
        btn.addEventListener('click', function () { toggle(target, icon); });
        btn.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle(target, icon);
          }
        });
      });
    })();
  </script>
</body>
</html>
