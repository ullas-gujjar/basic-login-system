<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • Basic Login System UI</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="card auth-card">
      <div class="card-body">
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="brand-mark" aria-hidden="true">
            <i class="bi bi-shield-lock"></i>
          </div>
          <div>
            <h1 class="h3 mb-1 page-title">Sign in</h1>
            <p class="mb-0 page-subtitle">Access your account securely.</p>
          </div>
        </div>

        <form class="mt-4" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" type="text" class="form-control" placeholder="Enter your username" required />
          </div>

          <div class="mb-2">
            <div class="d-flex justify-content-between align-items-center">
              <label for="password" class="form-label mb-0">Password</label>
              <a class="small-link" href="forgot-password.html">Forgot Password?</a>
            </div>
            <input id="password" type="password" class="form-control mt-2" placeholder="Enter your password" required />
          </div>

          <button type="submit" class="btn btn-primary w-100 mt-3">
            Login
            <i class="bi bi-arrow-right ms-1"></i>
          </button>

          <div class="mt-4 text-center">
            <span class="text-white-50">New here?</span>
            <a class="small-link fw-semibold" href="register.html">Create a New Account</a>
          </div>
        </form>

        <div class="divider my-4">OR</div>

        <a class="btn btn-outline-light w-100" href="register.html">
          <i class="bi bi-person-plus me-2"></i>
          Create account
        </a>
      </div>
    </section>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
