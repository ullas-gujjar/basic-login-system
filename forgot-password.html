<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password • Basic Login System UI</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="card auth-card">
      <div class="card-body">
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="brand-mark" aria-hidden="true">
            <i class="bi bi-envelope-lock"></i>
          </div>
          <div>
            <h1 class="h3 mb-1 page-title">Forgot password</h1>
            <p class="mb-0 page-subtitle">We’ll email you a reset link.</p>
          </div>
        </div>

        <form class="mt-4" onsubmit="event.preventDefault(); window.location.href='reset-password.html';">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" class="form-control" placeholder="name@example.com" required />
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Send Password Reset Link
            <i class="bi bi-send ms-1"></i>
          </button>

          <div class="mt-4 text-center">
            <a class="small-link" href="login.html">
              <i class="bi bi-arrow-left me-1"></i>
              Back to login
            </a>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
