<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register • Basic Login System UI</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="card auth-card">
      <div class="card-body">
        <div class="d-flex align-items-center gap-3 mb-3">
          <div class="brand-mark" aria-hidden="true">
            <i class="bi bi-person-badge"></i>
          </div>
          <div>
            <h1 class="h3 mb-1 page-title">Create account</h1>
            <p class="mb-0 page-subtitle">Join in under a minute.</p>
          </div>
        </div>

        <form class="mt-4" onsubmit="event.preventDefault(); window.location.href='login.html';">
          <div class="row g-3">
            <div class="col-12">
              <label for="name" class="form-label">Name</label>
              <input id="name" type="text" class="form-control" placeholder="Your full name" required />
            </div>

            <div class="col-12">
              <label for="email" class="form-label">Email ID</label>
              <input id="email" type="email" class="form-control" placeholder="name@example.com" required />
            </div>

            <div class="col-12">
              <label for="phone" class="form-label">Phone Number</label>
              <input id="phone" type="tel" class="form-control" placeholder="e.g. +1 555 0123" inputmode="tel" required />
            </div>

            <div class="col-12">
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" class="form-control" placeholder="Create a strong password" minlength="6" required />
              <div class="form-text text-white-50">Use at least 6 characters.</div>
            </div>

            <div class="col-12">
              <label for="confirm" class="form-label">Confirm Password</label>
              <input id="confirm" type="password" class="form-control" placeholder="Re-enter your password" minlength="6" required />
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100">
                Register
                <i class="bi bi-check2-circle ms-1"></i>
              </button>
            </div>

            <div class="col-12 text-center">
              <span class="text-white-50">I already have an account.</span>
              <a class="small-link fw-semibold" href="login.html">Sign in</a>
            </div>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
